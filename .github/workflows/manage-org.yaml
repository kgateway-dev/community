name: Manage kgateway-dev org
on:
  push:
    branches:
    - main
    paths:
    - org.yaml
jobs:
  manage-org:
    runs-on: ubuntu-latest
    steps:
    - name: checkout community repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: update org
      env:
        GH_TOK: ${{secrets.GATEWAYBOT}}
      run: |
        echo $GH_TOK >> ./GH_TOK
        script/org/update.sh --confirm
        rm ./GH_TOK
